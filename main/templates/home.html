<!DOCTYPE html>
<html> <!-- початок сторінки -->
    {% load static %}

    <head>
        <title>{%block title %}Марс {% endblock %}</title> <!--назва вкладки-->

    <body>

        <div class="container-fluid">

            <h1 class="title">LOG-986</h1> <!--заголовок-->

            <a href="/underground" class="red-button">База</a>

            <p>Зробленно в цілях конкорсу LogicRace(Ірина Корчинська)</p>
            
        </div>

        <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <main>
